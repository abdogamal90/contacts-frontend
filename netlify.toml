# =============================================================================
# Build settings
# =============================================================================
[build]
  command   = "npm run build"
  publish   = "dist/contacts-frontend/browser"

[build.environment]
  NODE_VERSION = "20"

# =============================================================================
# Proxy: forward /api/* and /socket.io/* to EC2 so the browser stays on HTTPS
# Replace the IP/port below with your actual EC2 public IP and port.
# =============================================================================
[[redirects]]
  from   = "/api/*"
  to     = "http://3.84.133.199:8000/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/socket.io/*"
  to     = "http://3.84.133.199:8000/socket.io/:splat"
  status = 200
  force  = true

# =============================================================================
# SPA fallback — must be LAST
# IMPORTANT: Remove the @netlify/angular-runtime plugin from
#            Netlify UI → Site settings → Plugins, or this will conflict.
# =============================================================================
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200