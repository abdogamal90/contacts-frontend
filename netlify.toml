# Proxy API + Socket.io calls to EC2 so the browser stays on HTTPS (no mixed content).
# These run as plain Netlify redirects — no SSR edge function intercepts them now.
# IMPORTANT: @netlify/angular-runtime must also be removed from the Netlify UI (Site settings → Plugins).
[[redirects]]
  from = "/*"
  status = 200
  to = "/index.html"